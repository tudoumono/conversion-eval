# Description:
#   このYAMLは「変換ロジック」ではなく、実験パターンの一覧表です。
#
# 各エントリは src/conversion_eval/config/loader.py で以下のPythonオブジェクトに変換されます。
#
#   Pattern(
#       id="<id>",
#       name="<name>",
#       preprocessor="<preprocessor>",
#       converter="<converter>",
#       applicable_extensions=("<ext1>", "<ext2>", ...),
#       uses_llm=<true/false>,
#       llm_provider="<none|ollama|openai>",
#       uses_ocr=<true/false>,
#       force_full_page_ocr=<true/false>,
#       uses_internal_models=<true/false>,
#       allow_network_download=<true/false>,
#   )
#
# applicable_extensions は「最初に拾う入力ファイル」の対象拡張子です。
# Markdown変換に渡す拡張子は、preprocessorの形式変換結果で決まります。
# 例: pattern_a の .doc はCOM形式変換後に .docx としてMarkItDownへ渡します。
#
# pipeline側では、おおよそ以下の流れで部品を接続します。
# コード上の項目名は preprocessor ですが、ユーザー向けには「形式変換方式」と呼びます。
# ここでいう形式変換は .doc → .docx のような入力形式の正規化であり、
# Markdown出力後のノイズ正規化とは別の処理です。
#
#   preprocessor = create_preprocessor(pattern.preprocessor)
#   converter = create_converter(pattern.converter, pattern=pattern)
#   intermediate = preprocessor.run(input_file, intermediate_dir)
#   markdown = converter.convert(intermediate.path, output_dir)
#
# 例:
#
#   - id: pattern_e
#     preprocessor: none
#     converter: markitdown
#
# これは以下の意味です。
#
#   「形式変換は行わず、元ファイルをそのままMarkItDownに渡す」
#
# 利用可能な部品名:
#   形式変換方式: none, com, libreoffice, com_pdf, libreoffice_pdf
#   converters: markitdown, docling, com_direct, office_embedded_ocr
#
# パターン設計の考え方:
#   1. MarkItDown と Docling の単純比較では、OCRの有無を混ぜません。
#      そのため Direct + Docling の基本形は uses_ocr=false にしています。
#   2. OCRの効果は、Docling OCR用パターンで別途比較します。
#      通常OCRとページ全体OCRも分けています。
#   3. LLMは全パターンで使いません。
#   4. .txt と .md は、Markdown変換の品質比較から外します。
#      .txt はほぼ本文の受け渡しで、.md はすでにMarkdownのためです。
#   5. Office/RTFをPDF化してからOCRするパターンは、PDF化方式ごとに分けます。
#      COM PDF化とLibreOffice PDF化では出力PDFが変わる可能性があるためです。
#
# モデル利用ポリシー:
#   uses_llm:
#     外部LLMまたはローカルLLMを呼び出すパターンなら true にします。
#     現状のWS1変換パターンではすべて false です。
#   llm_provider:
#     LLMを使う場合だけ ollama または openai を指定します。
#     指定なし、または none の場合はLLMを使用しません。
#   uses_ocr:
#     OCRを使うパターンなら true にします。DoclingのOCRはLLMではありません。
#   force_full_page_ocr:
#     スキャンPDF向けに、PDFページ全体をOCRしたい場合だけ true にします。
#   uses_internal_models:
#     DoclingのOCR/AI-OCR/レイアウト解析のように、LLMではない内部MLモデルを使う場合は true にします。
#   allow_network_download:
#     実行中にモデルや追加アセットをネットワーク取得してよい場合だけ true にします。
#     PoCの再現性とair-gapped運用を意識し、通常は false にします。

patterns:
  - id: pattern_a
    name: "COM + MarkItDown"
    preprocessor: com
    converter: markitdown
    applicable_extensions: [.doc, .xls, .rtf, .pdf]
    uses_llm: false
    llm_provider: none
    uses_ocr: false
    force_full_page_ocr: false
    uses_internal_models: false
    allow_network_download: false

  - id: pattern_b
    name: "COM + Docling no OCR"
    preprocessor: com
    converter: docling
    applicable_extensions: [.doc, .xls, .rtf, .pdf]
    uses_llm: false
    llm_provider: none
    uses_ocr: false
    force_full_page_ocr: false
    uses_internal_models: true
    allow_network_download: false

  - id: pattern_c
    name: "LibreOffice + MarkItDown"
    preprocessor: libreoffice
    converter: markitdown
    applicable_extensions: [.doc, .xls, .rtf]
    uses_llm: false
    llm_provider: none
    uses_ocr: false
    force_full_page_ocr: false
    uses_internal_models: false
    allow_network_download: false

  - id: pattern_d
    name: "LibreOffice + Docling no OCR"
    preprocessor: libreoffice
    converter: docling
    applicable_extensions: [.doc, .xls, .rtf]
    uses_llm: false
    llm_provider: none
    uses_ocr: false
    force_full_page_ocr: false
    uses_internal_models: true
    allow_network_download: false

  - id: pattern_e
    name: "Direct + MarkItDown"
    preprocessor: none
    converter: markitdown
    applicable_extensions: [.docx, .xlsx, .pptx, .pdf]
    uses_llm: false
    llm_provider: none
    uses_ocr: false
    force_full_page_ocr: false
    uses_internal_models: false
    allow_network_download: false

  - id: pattern_f
    name: "Direct + Docling no OCR"
    preprocessor: none
    converter: docling
    applicable_extensions: [.docx, .xlsx, .pptx, .pdf]
    uses_llm: false
    llm_provider: none
    uses_ocr: false
    force_full_page_ocr: false
    uses_internal_models: true
    allow_network_download: false

  - id: pattern_g
    name: "COM direct Markdown"
    preprocessor: none
    converter: com_direct
    applicable_extensions: [.doc, .docx, .xls, .xlsx, .rtf, .pdf]
    uses_llm: false
    llm_provider: none
    uses_ocr: false
    force_full_page_ocr: false
    uses_internal_models: false
    allow_network_download: false

  - id: pattern_h
    name: "Direct + Docling OCR auto"
    preprocessor: none
    converter: docling
    applicable_extensions: [.pdf]
    uses_llm: false
    llm_provider: none
    uses_ocr: true
    force_full_page_ocr: false
    uses_internal_models: true
    allow_network_download: false

  - id: pattern_i
    name: "Direct + Docling OCR full page"
    preprocessor: none
    converter: docling
    applicable_extensions: [.pdf]
    uses_llm: false
    llm_provider: none
    uses_ocr: true
    force_full_page_ocr: true
    uses_internal_models: true
    allow_network_download: false

  - id: pattern_j
    name: "Direct + MarkItDown + embedded image OCR"
    preprocessor: none
    converter: office_embedded_ocr
    applicable_extensions: [.docx, .pptx]
    uses_llm: false
    llm_provider: none
    uses_ocr: true
    force_full_page_ocr: false
    uses_internal_models: true
    allow_network_download: false

  - id: pattern_k
    name: "COM PDF + Docling OCR auto"
    preprocessor: com_pdf
    converter: docling
    applicable_extensions: [.doc, .docx, .xls, .xlsx, .rtf]
    uses_llm: false
    llm_provider: none
    uses_ocr: true
    force_full_page_ocr: false
    uses_internal_models: true
    allow_network_download: false

  - id: pattern_l
    name: "COM PDF + Docling OCR full page"
    preprocessor: com_pdf
    converter: docling
    applicable_extensions: [.doc, .docx, .xls, .xlsx, .rtf]
    uses_llm: false
    llm_provider: none
    uses_ocr: true
    force_full_page_ocr: true
    uses_internal_models: true
    allow_network_download: false

  - id: pattern_m
    name: "LibreOffice PDF + Docling OCR auto"
    preprocessor: libreoffice_pdf
    converter: docling
    applicable_extensions: [.doc, .docx, .xls, .xlsx, .rtf]
    uses_llm: false
    llm_provider: none
    uses_ocr: true
    force_full_page_ocr: false
    uses_internal_models: true
    allow_network_download: false

  - id: pattern_n
    name: "LibreOffice PDF + Docling OCR full page"
    preprocessor: libreoffice_pdf
    converter: docling
    applicable_extensions: [.doc, .docx, .xls, .xlsx, .rtf]
    uses_llm: false
    llm_provider: none
    uses_ocr: true
    force_full_page_ocr: true
    uses_internal_models: true
    allow_network_download: false
